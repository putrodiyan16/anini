<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Bintang Ajaib 🌟</title>
    <style>
        /* --- 1. LATAR BELAKANG DUNIA ANAK --- */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #e0f7fa; /* Biru langit muda */
            background-image: radial-gradient(#ffffff 20%, transparent 20%), radial-gradient(#ffffff 20%, transparent 20%);
            background-position: 0 0, 50px 50px;
            background-size: 100px 100px;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            overflow: hidden;
        }

        /* --- 2. KONSTRUKSI BUKU --- */
        .book-container {
            perspective: 2000px;
            width: 320px;
            height: 450px;
        }

        .book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }

        .page {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            padding: 30px;
            box-sizing: border-box;
            border-radius: 15px 25px 25px 15px;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.1);
            backface-visibility: hidden;
            transform-origin: left;
            transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 8px solid white;
        }

        /* --- 3. TEMA HALAMAN (WARNA-WARNI TK) --- */
        
        /* Sampul: Warna Oranye Ceria */
        .cover {
            background: #ff9800;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            color: white;
            z-index: 5;
        }

        /* Halaman 1: Warna Hijau Taman */
        .page-1 {
            background: #ccff90; 
            z-index: 4;
        }

        /* Halaman 2: Warna Biru Laut */
        .page-2 {
            background: #81d4fa;
            z-index: 3;
        }

        /* Halaman Terakhir: Warna Pink Manis */
        .back-cover {
            background: #f48fb1;
            z-index: 2;
            transform: rotateY(0deg) !important; /* Tidak bisa di-flip */
        }

        /* Efek Membalik */
        .page.flipped {
            transform: rotateY(-150deg);
            z-index: 1 !important;
        }

        /* --- 4. ELEMEN DEKORASI --- */
        h1 { font-size: 28px; margin-bottom: 10px; text-shadow: 2px 2px #ff6f00; }
        h2 { color: #2e7d32; margin-top: 0; }

        .photo-frame {
            width: 160px;
            height: 160px;
            background: white;
            padding: 10px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            border: 5px dashed #ffeb3b;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .stars {
            font-size: 35px;
            margin: 10px 0;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.1));
        }

        .badge {
            background: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            color: #ff4081;
            display: inline-block;
            margin-top: 10px;
        }

        .btn-reset {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: white;
            color: #f48fb1;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #d81b60;
        }

        .btn-reset:active { transform: translateY(3px); box-shadow: none; }

    </style>
</head>
<body>

    <div class="book-container">
        <div class="book">
            
            <div class="page back-cover">
                <h1>🎉 WOW!</h1>
                <p>Kamu sudah mengumpulkan banyak bintang!</p>
                <div class="stars">🏆🏆🏆</div>
                <button class="btn-reset" onclick="resetBook()">Baca Lagi</button>
            </div>

            <div class="page page-2" onclick="flipPage(this)">
                <h2>Anak Mandiri</h2>
                <div class="photo-frame">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Foto Anak">
                </div>
                <div class="stars">⭐⭐⭐⭐</div>
                <p>Hebat! Kamu sudah bisa pakai sepatu sendiri!</p>
                <div class="badge">Anak Pintar</div>
            </div>

            <div class="page page-1" onclick="flipPage(this)">
                <h2>Juara Sabar</h2>
                <div class="photo-frame">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" alt="Foto Anak">
                </div>
                <div class="stars">⭐⭐⭐⭐⭐</div>
                <p>Terima kasih sudah mau berbagi mainan dengan teman.</p>
                <div class="badge">Bintang Kebaikan</div>
            </div>

            <div class="page cover" onclick="flipPage(this)">
                <div style="font-size: 60px;">🌟</div>
                <h1>BUKU BINTANG</h1>
                <h2 style="color: white; background: rgba(0,0,0,0.1); padding: 5px 15px; border-radius: 10px;">
                    [NAMA ANAK]
                </h2>
                <p>Ketuk untuk melihat<br>keajaibanmu!</p>
                <div class="stars">✨✨✨</div>
            </div>

        </div>
    </div>

    <script>
        function flipPage(element) {
            element.classList.add('flipped');
        }

        function resetBook() {
            const pages = document.querySelectorAll('.page');
            // Balikkan urutan agar menutup dari belakang ke depan
            pages.forEach((page, index) => {
                setTimeout(() => {
                    page.classList.remove('flipped');
                }, index * 100);
            });
        }
    </script>
</body>
</html>
